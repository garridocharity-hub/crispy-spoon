<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Charity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
      line-height: 1.6;
    }

    section {
      padding: 60px 20px;
      max-width: 800px;
      margin: auto;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.2em;
      color: #888;
      text-transform: lowercase;
      margin-bottom: 20px;
    }

    .gallery img {
      width: 100%;
      margin-bottom: 20px;
      border-radius: 6px;
    }

    .entry {
      margin-bottom: 20px;
    }

    audio {
      width: 100%;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<section>
  <h1>Charity</h1>
  <p>digital art • sound • movement • thought</p>
</section>

<section>
  <h2>journal</h2>
  <div class="entry">I make things when I can’t explain what I feel.</div>
  <div class="entry">Some days feel louder than others.</div>
</section>

<section>
  <h2>art</h2>
  <div class="gallery">
    <img src="https://via.placeholder.com/800x600">
    <img src="https://via.placeholder.com/800x600">
  </div>
</section>

<section>
  <h2>sound</h2>
  <audio controls>
    <source src="" type="audio/mpeg">
  </audio>
</section>

<section>
  <h2>places</h2>
  <div class="gallery">
    <img src="https://via.placeholder.com/800x600">
    <p>this didn’t feel like home, but I needed it</p>
  </div>
</section>

</body>
</html>
